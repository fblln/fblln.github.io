<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" role="img" aria-labelledby="t d" font-family="'Helvetica Neue', Arial, 'Liberation Sans', sans-serif">
  <title id="t">Architecture Must Follow Pressure</title>
  <desc id="d">Editorial poster on warm paper: the stacked title with the word PRESSURE in signal red over a hairline grid, and the maxim no architectural pressure, no architectural pattern.</desc>
  <defs><style>
@font-face{font-family:'Archivo';font-weight:800;font-style:normal;src:url(data:font/woff2;base64,) format('woff2');}
@font-face{font-family:'IBM Plex Mono';font-weight:500;font-style:normal;src:url(data:font/woff2;base64,) format('woff2');}
  </style></defs>

  <rect width="1000" height="460" fill="#f2f0e9"/>

  <g stroke="#0a0a0a" stroke-opacity="0.12" stroke-width="1">
    <line x1="250" y1="0" x2="250" y2="460"/>
    <line x1="500" y1="0" x2="500" y2="460"/>
    <line x1="750" y1="0" x2="750" y2="460"/>
    <line x1="0" y1="153" x2="1000" y2="153"/>
    <line x1="0" y1="306" x2="1000" y2="306"/>
  </g>
  <rect x="0.5" y="0.5" width="999" height="459" fill="none" stroke="#0a0a0a" stroke-opacity="0.28" stroke-width="1"/>
  <rect x="66" y="96" width="22" height="22" fill="#ff3b00"/>

  <g fill="#0a0a0a" font-weight="800" font-size="94" letter-spacing="-4">
    <text x="63" y="212">ARCHITECTURE</text>
    <text x="63" y="296">MUST FOLLOW</text>
    <text x="63" y="380" fill="#ff3b00">PRESSURE.</text>
  </g>

  <text x="66" y="430" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="14" font-weight="500" letter-spacing="1.5" fill="#65635e">NO ARCHITECTURAL PRESSURE, NO ARCHITECTURAL PATTERN.</text>
</svg>
