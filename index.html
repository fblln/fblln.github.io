    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><rect width=%2264%22 height=%2264%22 fill=%22%230a0a0a%22/><path d=%22M14 12h36v8H23v9h22v8H23v15h-9z%22 fill=%22white%22/></svg>" />
    <!-- A prior successful boot means the wasm is cached; mark this load "warm" so
         styles.css hides the boot screen before first paint — no dark flash on refresh. -->
    <script>
      try { if (localStorage.getItem('fe:booted')) document.documentElement.setAttribute('data-warm', ''); } catch (e) {}
    </script>
    <!-- Current rustc enables bulk-memory & friends by default for wasm32; trunk's
         bundled wasm-opt needs them explicitly enabled or the release build fails. -->
    <link data-trunk rel="rust"
      data-wasm-opt-params="--enable-bulk-memory --enable-nontrapping-float-to-int --enable-multivalue --enable-mutable-globals --enable-sign-ext --enable-reference-types" />
    <link data-trunk rel="css" href="styles.css" />
    <link data-trunk rel="copy-dir" href="assets" />
    <link data-trunk rel="copy-file" href="robots.txt" />
    <link data-trunk rel="copy-file" href="sitemap.xml" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "@id": "https://fblln.github.io/#website",
            "url": "https://fblln.github.io/",
            "name": "Fabio Ellena"
          },
          {
            "@type": "Person",
            "@id": "https://fblln.github.io/#fabio-ellena",
            "name": "Fabio Ellena",
            "url": "https://fblln.github.io/",
            "image": "https://fblln.github.io/assets/fabio.jpg",
            "jobTitle": "Senior Staff Software Engineer",
            "address": {
              "@type": "PostalAddress",
              "addressLocality": "Turin",
              "addressCountry": "IT"
            },
            "sameAs": [
              "https://www.linkedin.com/in/fabioellena/",
              "https://github.com/fblln"
            ]
          }
        ]
      }
    </script>
  </head>
  <body>
    <main id="boot" class="boot" aria-labelledby="boot-title">
      <span>FBLLN/WASM</span>
      <h1 id="boot-title">INITIALIZING RUST RUNTIME</h1>
      <span class="boot-line"></span>
    </main>
    <noscript>
      <main>
        <h1>Fabio Ellena — Senior Staff Software Engineer</h1>
        <p>This portfolio is a full WebAssembly application and requires JavaScript to instantiate the Rust runtime.</p>
      </main>
    </noscript>
  </body>
</html>
