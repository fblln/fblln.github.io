[build]
target = "index.html"
dist = "dist"
public_url = "/"
filehash = true
# Minification is done by the esbuild post_build hook, not trunk's bundled
# minify-js (which can't parse the wasm-bindgen loader). no_sri lets the hook
# rewrite the hashed assets without invalidating integrity attributes.
minify = "never"
no_sri = true

# Render the portfolio, generate articles, then minify in a deterministic order.
[[hooks]]
stage = "post_build"
command = "sh"
command_arguments = ["tools/post-build.sh"]

[watch]
watch = ["src", "shared", "styles.css", "index.html", "assets", "content", "tools/blog/src", "tools/blog/article.css"]
ignore = ["dist"]

[serve]
addresses = ["127.0.0.1"]
port = 8080
open = false
