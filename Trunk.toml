[build]
target = "index.html"
dist = "dist"
public_url = "/"
filehash = true
# Minification is done by the esbuild post_build hook, not trunk's bundled
# minify-js (which can't parse the wasm-bindgen loader). no_sri lets the hook
# rewrite the hashed assets without invalidating integrity attributes.
minify = "never"
no_sri = true

# Generate static article pages from content/articles/*.md into dist/articles/.
[[hooks]]
stage = "post_build"
command = "cargo"
command_arguments = ["run", "--quiet", "--manifest-path", "tools/blog/Cargo.toml"]

[[hooks]]
stage = "post_build"
command = "sh"
command_arguments = ["tools/minify.sh"]

[watch]
watch = ["src", "styles.css", "index.html", "assets", "content", "tools/blog/src", "tools/blog/article.css"]
ignore = ["dist"]

[serve]
addresses = ["127.0.0.1"]
port = 8080
open = false

